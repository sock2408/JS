<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таблица</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .container {
            padding: 0;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #2c5f8a;
        }
        button {
            background-color: #2c5f8a;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.2s ease;
            width: 100%;
        }
        button:hover {
            background-color: #1e3e5c;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background-color: #f0f2f5;
            border-radius: 12px;
            text-align: center;
            font-size: 15px;
        }
        p {
            margin: 0;
        }
    </style>
</head>
<body>
    <h1>Таблица</h1>
    <form id="crowForm">
        <div class="container">
            <label for="rows">Количество строк (n ≥ 1):</label>
            <input type="number" id="rows" min="1">
            <button type="submit" id="drawButton">Рисовать</button>
            <div id="result">
                <p style="color: green;">Результат будет выведен в консоль</p>
            </div>
        </div>
    </form>
    <script>
        "use strict";
        document.getElementById('crowForm').addEventListener('submit', function(event) {
            const rows = parseInt(document.getElementById('rows').value);
            const resultDiv = document.getElementById('result');
            
            if (isNaN(rows) || rows < 1) {
                resultDiv.innerHTML = '<p style="color: green;">Пожалуйста, введите корректное число строк (n ≥ 1)</p>';
                return;
            }
            
            console.clear();
            generateAnimalTable(rows);
            
            resultDiv.innerHTML = '<p style="color: green;">Таблица уже в консоле!!!</p>';
            event.preventDefault();
        });
        
        function generateAnimalTable(rows) {
            const pattern = ['dog', 'dog', 'dog', 'cat', 'cat'];
            let patternIndex = 0;
            
            for (let i = 0; i < rows; i++) {
                let row = [];
                for (let j = 0; j < 6; j++) {
                    row.push(pattern[patternIndex % pattern.length]);
                    patternIndex++;
                }
                console.log(row.join('\t'));
            }
        }
    </script>
</body>
</html>
