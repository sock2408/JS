<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плейсхолдер-подсказка</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        ::placeholder {
        color: blue;
        }
    </style>
</head>

<body>

    <form id="form">
        <label for="placeholder"></label>
        <input id="placeholder" type="text" data-placeholder="ВВЕДИТЕ ТЕКСТ!!!">
    </form>

    <script>
        'use strict';

        let form = document.getElementById("form");
        let field = form.getElementsByTagName('input')[0];
        let label = form.getElementsByTagName('label')[0];

        label.style.visibility = 'hidden';
        label.style.position = 'absolute';
        label.style.marginLeft = '5px';
        label.style.marginTop = '-20px';
        label.style.fontSize = '12px';
        label.style.color = 'blue';
        label.style.backgroundColor = 'white';
        label.style.padding = '0 4px';

        field.setAttribute('placeholder', field.dataset.placeholder);
        label.innerHTML = field.dataset.placeholder;

        field.addEventListener('focus', () => {
            label.style.visibility = 'visible';
            field.setAttribute('placeholder', '');
        });

        field.addEventListener('blur', () => {
            label.style.visibility = 'hidden';
            
            if (field.value === '') {
                field.setAttribute('placeholder', field.dataset.placeholder);
            }
        });
    </script>

</body>

</html>
