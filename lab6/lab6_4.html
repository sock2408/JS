<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактируемая таблица</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }

        th,
        td {
            border: 1px solid #00ff22;
            padding: 30px;
        }

        td textarea {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            resize: none;
        }

        .edit-buttons {
            margin-top: 5px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <table id="editable-table">
        <tr>
            <th>Колонка 1</th>
            <th>Колонка 2</th>
        </tr>
        <tr>
            <td>Клетка 1</td>
            <td>Клетка 2</td>
        </tr>
        <tr>
            <td>Клетка 3</td>
            <td>Клетка 4</td>
        </tr>
        <tr>
            <td>Клетка 5</td>
            <td>Клетка 6</td>
        </tr>
    </table>

    <script>
        'use strict';
        
        document.getElementById('editable-table').addEventListener('click', function (event) {
            let target = event.target;

            if (target.tagName === 'TEXTAREA') 
                return;
            if (document.querySelector('td.editing')) 
                return;

            while (target && target !== this) {
                if (target.tagName === 'TD') {
                    startEditing(target);
                    return;
                }
                target = target.parentNode;
            }
        });

        function startEditing(td) {
            td.classList.add('editing');

            let currentHtml = td.innerHTML;
            td.setAttribute('original-html', currentHtml);
            

            td.innerHTML = `<textarea>${escapeHtml(currentHtml)}</textarea>
                  <div class="edit-buttons">
                    <button class="ok-button">OK</button>
                    <button class="cancel-button">ОТМЕНА</button>
                  </div>`;

            td.querySelector('textarea').focus();

            td.querySelector('.ok-button').addEventListener('click', function () {
                finishEditing(td, true);
            });

            td.querySelector('.cancel-button').addEventListener('click', function () {
                finishEditing(td, false);
            });
        }

        function finishEditing(td, isSave) {
            let textarea = td.querySelector('textarea');

            let originalHtml = td.getAttribute('original-html');

            if (isSave)
                td.innerHTML = textarea.value;  // ← теперь HTML-теги сработают
            else
                td.innerHTML = originalHtml;

            td.classList.remove('editing');
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>

</body>

</html>
